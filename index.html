<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MagnifyAll - Product Reader</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        .capitalize-first::first-letter { text-transform: uppercase; }
        #reader button {
            background-color: #4f46e5; color: white; padding: 16px 24px;
            border-radius: 12px; font-size: 22px; font-weight: bold;
            margin: 10px; border: none; cursor: pointer;
            transition: background-color 0.2s;
        }
        #reader button:focus-visible,
        button:focus-visible, a:focus-visible {
            outline: 3px solid #fbbf24;
            outline-offset: 2px;
        }
        #reader a { display: none !important; }
        #reader__dashboard_section_csr span { font-size: 18px; }
        body { -webkit-tap-highlight-color: transparent; }
        .nav-item { transition: all 0.2s; }
    </style>
</head>
<body class="bg-gradient-to-b from-slate-50 to-slate-100 font-sans text-slate-900">

    <div id="root">
        <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; background:#f8fafc;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:4rem; color:#4f46e5; margin-bottom:1rem;"></i>
            <h2 style="font-family:sans-serif; color:#334155; font-size:1.5rem; font-weight:bold;">Loading Magnifier...</h2>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const fetchWithTimeout = async (url, timeout = 8000) => {
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), timeout);
            try {
                const response = await fetch(url, { signal: controller.signal });
                clearTimeout(id);
                return response;
            } catch (error) {
                clearTimeout(id);
                throw error;
            }
        };

        const App = () => {
            const [scanning, setScanning] = useState(false);
            const [searchInput, setSearchInput] = useState("");
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState("");
            
            const [productData, setProductData] = useState(null);
            const [productType, setProductType] = useState(""); 
            
            const [textSize, setTextSize] = useState(24);

            const currentSearchId = useRef(0);
            const scannerRef = useRef(null);

            const [history, setHistory] = useState(() => {
                try {
                    return JSON.parse(localStorage.getItem('magnifyAll_history')) || { success: [], failed: [] };
                } catch(e) { return { success: [], failed: [] }; }
            });
            const [showHistory, setShowHistory] = useState(false);
            const [historyTab, setHistoryTab] = useState("success");

            useEffect(() => {
                localStorage.setItem('magnifyAll_history', JSON.stringify(history));
            }, [history]);

            // Hash navigation
            useEffect(() => {
                const onHashChange = () => {
                    const hash = window.location.hash;
                    if (hash === '#scanner') {
                        currentSearchId.current++;
                        setLoading(false);
                        setScanning(true);
                        setShowHistory(false);
                        setError("");
                        setProductData(null);
                    } else if (hash === '#history') {
                        currentSearchId.current++;
                        setLoading(false);
                        setShowHistory(true);
                        setScanning(false);
                        setError("");
                        setProductData(null);
                    } else if (hash === '#product') {
                        setShowHistory(false);
                        setScanning(false);
                        setError("");
                    } else if (hash === '#error') {
                        setShowHistory(false);
                        setScanning(false);
                    } else {
                        currentSearchId.current++; 
                        setLoading(false);
                        setScanning(false);
                        setShowHistory(false);
                        setProductData(null);
                        setError("");
                    }
                };
                window.addEventListener('hashchange', onHashChange);
                onHashChange();
                return () => window.removeEventListener('hashchange', onHashChange);
            }, []);

            const safeBack = () => {
                if (window.location.hash !== '') {
                    window.history.back();
                    setTimeout(() => {
                        if (window.location.hash !== '') window.location.hash = '';
                    }, 100);
                }
            };

            const resetApp = () => {
                currentSearchId.current++;
                setLoading(false);
                setScanning(false);
                setShowHistory(false);
                setProductData(null);
                setError("");
                setSearchInput("");
                setTextSize(24);
                window.location.hash = '';
            };

            // Scanner
            useEffect(() => {
                let html5QrCode;
                if (scanning && window.Html5Qrcode) {
                    html5QrCode = new window.Html5Qrcode("reader");
                    scannerRef.current = html5QrCode;
                    
                    html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: { width: 250, height: 150 }, aspectRatio: 1.0 },
                        (decodedText) => {
                            if (html5QrCode.isScanning) {
                                html5QrCode.stop().then(() => searchUniversal(decodedText)).catch(() => searchUniversal(decodedText));
                            }
                        },
                        () => {}
                    ).catch(err => {
                        console.error("Camera start failed:", err);
                        let msg = "Could not start camera. Make sure:";
                        if (location.protocol !== 'https:') msg += "\n• You are using HTTPS";
                        msg += "\n• Camera permission is granted";
                        msg += "\n• No other app is using the camera";
                        setError(msg);
                        window.location.hash = 'error';
                        setScanning(false);
                    });
                }
                return () => {
                    if (scannerRef.current && scannerRef.current.isScanning) {
                        scannerRef.current.stop().catch(e => console.log("Scanner cleanup", e));
                    }
                };
            }, [scanning]);

            const fetchOpenFacts = async (barcode, domain) => {
                const res = await fetchWithTimeout(`https://world.${domain}/api/v0/product/${barcode}.json`);
                return await res.json();
            };

            // Reverted to sequential OpenFacts search for compatibility
            const searchUniversal = async (query) => {
                const searchId = ++currentSearchId.current;
                setLoading(true);
                setError("");
                setProductData(null);
                setProductType("");

                const cleanQuery = query.trim();
                const isBarcode = /^\d+$/.test(cleanQuery);
                let foundData = null, foundType = "";

                try {
                    if (isBarcode) {
                        const eanQuery = cleanQuery.padStart(13, '0');
                        const upcQuery = cleanQuery.padStart(12, '0');
                        const fdaQuery = cleanQuery.replace(/^0+/, '');

                        const openFactsQueries = Array.from(new Set([cleanQuery, eanQuery]));
                        for (const q of openFactsQueries) {
                            if (foundData) break;
                            for (const domain of ["openfoodfacts.org", "openbeautyfacts.org", "openproductsfacts.org"]) {
                                try {
                                    const data = await fetchOpenFacts(q, domain);
                                    if (data.status === 1) { 
                                        foundData = data.product; 
                                        foundType = domain.includes("food") ? "food" : domain.includes("beauty") ? "beauty" : "products";
                                        break;
                                    }
                                } catch (e) {}
                            }
                        }

                        if (!foundData) {
                            const fdaQueries = Array.from(new Set([cleanQuery, upcQuery, fdaQuery]));
                            for (const q of fdaQueries) {
                                if (foundData) break;
                                try {
                                    const fdaRes = await fetchWithTimeout(`https://api.fda.gov/drug/label.json?search=openfda.upc:"${q}"&limit=1`);
                                    const fdaData = await fdaRes.json();
                                    if (fdaData.results?.length) { foundData = fdaData.results[0]; foundType = "medicine"; break; }
                                } catch (e) {}
                            }
                        }

                        if (!foundData) {
                            try {
                                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(`https://api.upcitemdb.com/prod/trial/lookup?upc=${upcQuery}`)}`;
                                const upcRes = await fetchWithTimeout(proxyUrl, 15000);
                                const upcData = await upcRes.json();
                                if (upcData.code === "OK" && upcData.items?.length) { foundData = upcData.items[0]; foundType = "general"; }
                            } catch (e) { console.error("UPCItemDB error:", e); }
                        }

                        if (!foundData) throw new Error("Barcode not found in any database. Try typing the product name instead.");
                    } else {
                        try {
                            const fdaRes = await fetchWithTimeout(`https://api.fda.gov/drug/label.json?search=openfda.brand_name:"${cleanQuery}"&limit=1`);
                            const fdaData = await fdaRes.json();
                            if (fdaData.results?.length) { foundData = fdaData.results[0]; foundType = "medicine"; }
                        } catch (e) {}
                        if (!foundData) {
                            try {
                                const foodRes = await fetchWithTimeout(`https://world.openfoodfacts.org/cgi/search.pl?search_terms=${encodeURIComponent(cleanQuery)}&search_simple=1&action=process&json=1`);
                                const foodData = await foodRes.json();
                                if (foodData.products?.length) { foundData = foodData.products[0]; foundType = "food"; }
                            } catch (e) {}
                        }
                        if (!foundData) throw new Error("Could not find a product with that name. Try scanning its barcode.");
                    }
                    
                    if (searchId !== currentSearchId.current) return;

                    setProductData(foundData);
                    setProductType(foundType);
                    
                    const productName = foundType === "medicine" 
                        ? (foundData.openfda?.brand_name?.[0] || foundData.openfda?.generic_name?.[0] || "Medicine")
                        : foundType === "general"
                        ? (foundData.title || "Item")
                        : (foundData.product_name || foundData.title || "Item");
                        
                    setHistory(prev => ({ 
                        ...prev, 
                        success: [{ query: cleanQuery, name: productName, type: foundType, date: new Date().toISOString() }, ...prev.success] 
                    }));
                    window.location.hash = 'product';
                } catch (err) {
                    if (searchId !== currentSearchId.current) return;
                    setError(err.message || "Connection failed.");
                    setHistory(prev => ({ 
                        ...prev, 
                        failed: [{ query: cleanQuery, error: err.message || "Not found", date: new Date().toISOString() }, ...prev.failed] 
                    }));
                    window.location.hash = 'error';
                } finally {
                    if (searchId === currentSearchId.current) setLoading(false);
                }
            };

            const handleManualSearch = (e) => {
                e.preventDefault();
                if (searchInput.trim()) {
                    window.location.hash = '';  // go home to show loading
                    searchUniversal(searchInput.trim());
                }
            };

            const increaseText = () => setTextSize(prev => Math.min(prev + 6, 54));
            const decreaseText = () => setTextSize(prev => Math.max(prev - 6, 16));

            const cleanFdaText = (textArray) => {
                if (!textArray?.[0] || typeof textArray[0] !== 'string') return null;
                return textArray[0].replace(/^(ACTIVE INGREDIENT|INACTIVE INGREDIENTS|WARNINGS|PURPOSE):?/i, '').trim();
            };

            const formatIngredientsList = (ingredientsText) => {
                if (!ingredientsText || typeof ingredientsText !== 'string') return [];
                return ingredientsText.split(/,(?![^\(\)]*\))/).map(i => i.trim().replace(/^_/, '').replace(/_$/, '').trim()).filter(Boolean);
            };

            const renderOpenFactsData = (theme) => (
                <React.Fragment>
                    <div className={`bg-${theme.color}-50 p-6 border-b border-${theme.color}-100`}>
                        <div className="flex items-start gap-4">
                            {productData.image_url ? (
                                <img src={productData.image_url} alt="" className="w-20 h-20 object-cover rounded-xl border bg-white" />
                            ) : (
                                <i className={`fa-solid ${theme.icon} text-${theme.color}-500 text-5xl`}></i>
                            )}
                            <div>
                                <span className={`bg-${theme.color}-200 text-${theme.color}-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider`}>{theme.label}</span>
                                <h2 className="text-2xl font-extrabold text-slate-900 mt-1">{productData.product_name || "Unknown"}</h2>
                                <p className="text-lg text-slate-500">{productData.brands}</p>
                            </div>
                        </div>
                    </div>
                    {productData.allergens_hierarchy?.length > 0 && (
                        <div className="bg-amber-50 p-6 border-b border-amber-100 flex gap-4">
                            <i className="fa-solid fa-triangle-exclamation text-amber-600 text-2xl shrink-0 mt-1"></i>
                            <div>
                                <h3 className="text-xl font-bold text-amber-900 mb-1">Allergens/Warnings</h3>
                                <p className="text-lg text-amber-800 font-medium">
                                    {productData.allergens_hierarchy.map(a => typeof a === 'string' ? a.replace('en:', '').replace('-', ' ') : '').join(', ')}
                                </p>
                            </div>
                        </div>
                    )}
                    <div className="p-6">
                        <h3 className={`text-2xl font-bold text-slate-900 mb-4 flex items-center gap-2`}>
                            <i className={`fa-solid fa-circle-info text-${theme.color}-600`}></i> Ingredients
                        </h3>
                        {productData.ingredients_text ? (
                            <ul className="space-y-2" style={{ fontSize: `${textSize}px`, lineHeight: '1.4' }}>
                                {formatIngredientsList(productData.ingredients_text).map((ing, i) => (
                                    <li key={i} className="flex gap-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                        <span className={`text-${theme.color}-500 font-black`}>•</span>
                                        <span className="text-slate-700 capitalize-first">{ing}</span>
                                    </li>
                                ))}
                            </ul>
                        ) : (
                            <p className="text-slate-400 italic p-4">Ingredient list not in public database yet.</p>
                        )}
                    </div>
                </React.Fragment>
            );

            const renderMedicine = () => (
                <React.Fragment>
                    <div className="bg-teal-50 p-6 border-b border-teal-100">
                        <div className="flex items-start gap-4">
                            <i className="fa-solid fa-pills text-teal-600 text-5xl"></i>
                            <div>
                                <span className="bg-teal-200 text-teal-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">Medicine</span>
                                <h2 className="text-2xl font-extrabold text-slate-900 mt-1">
                                    {productData.openfda?.brand_name?.[0] || productData.openfda?.generic_name?.[0] || "Unknown"}
                                </h2>
                                <p className="text-lg text-teal-800 font-medium">{productData.openfda?.manufacturer_name?.[0]}</p>
                            </div>
                        </div>
                    </div>
                    {productData.purpose && (
                        <div className="p-6 bg-blue-50 border-b border-blue-100">
                            <h3 className="text-xl font-bold text-blue-900 mb-2 flex items-center gap-2"><i className="fa-solid fa-circle-info"></i> Purpose</h3>
                            <p style={{ fontSize: `${textSize}px` }} className="text-blue-800">{cleanFdaText(productData.purpose)}</p>
                        </div>
                    )}
                    <div className="p-6 border-b">
                        <h3 className="text-xl font-bold text-slate-800 mb-2 flex items-center gap-2"><i className="fa-solid fa-pills text-teal-600"></i> Active Ingredients</h3>
                        {productData.active_ingredient ? (
                            <p style={{ fontSize: `${textSize}px` }} className="text-slate-700 bg-teal-50/50 p-3 rounded-lg">{cleanFdaText(productData.active_ingredient)}</p>
                        ) : <p className="text-slate-400 italic">Not listed</p>}
                    </div>
                    {productData.warnings && (
                        <div className="p-6 border-b bg-amber-50">
                            <h3 className="text-xl font-bold text-amber-900 mb-2 flex items-center gap-2"><i className="fa-solid fa-shield-halved text-amber-600"></i> Warnings</h3>
                            <p style={{ fontSize: `${textSize}px` }} className="text-amber-900">{cleanFdaText(productData.warnings)}</p>
                        </div>
                    )}
                    <div className="p-6">
                        <h3 className="text-lg font-bold text-slate-600 mb-2">Inactive Ingredients</h3>
                        {productData.inactive_ingredient ? (
                            <p style={{ fontSize: `${Math.max(textSize-4, 16)}px` }} className="text-slate-600">{cleanFdaText(productData.inactive_ingredient)}</p>
                        ) : <p className="text-slate-400 italic">Not listed</p>}
                    </div>
                </React.Fragment>
            );

            const renderGeneral = () => (
                <React.Fragment>
                    <div className="bg-indigo-50 p-6 border-b border-indigo-100">
                        <div className="flex items-start gap-4">
                            {productData.images?.[0] ? (
                                <img src={productData.images[0]} alt="" className="w-20 h-20 object-cover rounded-xl border bg-white" />
                            ) : (
                                <i className="fa-solid fa-box text-indigo-500 text-5xl"></i>
                            )}
                            <div>
                                <span className="bg-indigo-200 text-indigo-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider">General</span>
                                <h2 className="text-2xl font-extrabold text-slate-900 mt-1">{productData.title || "Unknown"}</h2>
                                <p className="text-lg text-indigo-800 font-medium">{productData.brand}</p>
                            </div>
                        </div>
                    </div>
                    <div className="p-6">
                        <h3 className="text-xl font-bold text-slate-800 mb-3 flex items-center gap-2"><i className="fa-solid fa-circle-info text-indigo-600"></i> Description</h3>
                        {productData.description ? (
                            <p style={{ fontSize: `${textSize}px`, lineHeight: '1.6' }} className="text-slate-700 bg-slate-50 p-4 rounded-lg">{productData.description}</p>
                        ) : (
                            <p className="text-slate-400 italic p-4">No description available.</p>
                        )}
                    </div>
                </React.Fragment>
            );

            const isHomeView = !scanning && !productData && !loading && !error && !showHistory;
            const showBottomNav = isHomeView || showHistory;

            const navTo = (hash) => { window.location.hash = hash; };

            return (
                <div className="min-h-screen pb-20 flex flex-col">
                    {/* Header */}
                    <header className="bg-white shadow-sm border-b border-slate-200 px-4 py-3 flex items-center justify-between sticky top-0 z-10">
                        <h1 className="text-xl font-extrabold tracking-tight text-indigo-700 flex items-center gap-2 cursor-pointer" onClick={resetApp}>
                            <i className="fa-solid fa-magnifying-glass-plus text-2xl"></i> MagnifyAll
                        </h1>
                        <div className="flex gap-2">
                            {productData && !showHistory && (
                                <>
                                    <button onClick={decreaseText} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg shadow-sm" aria-label="Decrease text">
                                        <i className="fa-solid fa-magnifying-glass-minus"></i>
                                    </button>
                                    <button onClick={increaseText} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg shadow-sm" aria-label="Increase text">
                                        <i className="fa-solid fa-magnifying-glass-plus"></i>
                                    </button>
                                </>
                            )}
                            <button onClick={resetApp} className="p-2 bg-slate-100 hover:bg-slate-200 rounded-lg shadow-sm" title="Home">
                                <i className="fa-solid fa-house"></i>
                            </button>
                        </div>
                    </header>

                    {/* Main content */}
                    <main className="flex-1 max-w-2xl mx-auto w-full p-4">
                        {loading && (
                            <div className="bg-white rounded-3xl shadow-soft p-12 flex flex-col items-center justify-center">
                                <i className="fa-solid fa-spinner fa-spin text-indigo-500 text-6xl mb-4"></i>
                                <p className="text-xl text-slate-500 font-medium">Searching catalogs…</p>
                            </div>
                        )}

                        {error && !loading && (
                            <div className="bg-red-50 border-l-8 border-red-400 p-6 rounded-2xl shadow-sm text-center">
                                <i className="fa-solid fa-circle-exclamation text-red-400 text-5xl mb-4"></i>
                                <h2 className="text-2xl font-bold text-red-800 mb-2">Not Found</h2>
                                <p className="text-red-700 mb-4 whitespace-pre-line">{error}</p>
                                <button onClick={safeBack} className="px-6 py-2 bg-red-100 hover:bg-red-200 text-red-800 rounded-xl font-semibold flex items-center gap-2 mx-auto">
                                    <i className="fa-solid fa-arrow-left"></i> Back
                                </button>
                            </div>
                        )}

                        {scanning && !loading && !error && (
                            <div className="bg-white rounded-3xl shadow-soft overflow-hidden">
                                <div className="p-4 flex items-center justify-between bg-slate-50 border-b">
                                    <button onClick={safeBack} className="text-slate-500 hover:text-slate-800 font-bold text-xl flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left"></i> Back
                                    </button>
                                    <h2 className="text-xl font-bold text-slate-800">Scan Barcode</h2>
                                    <div className="w-10"></div>
                                </div>
                                <div id="reader" className="w-full border-b-4 border-indigo-200"></div>
                                <p className="text-center p-4 text-slate-500 font-medium">Point camera at a barcode</p>
                            </div>
                        )}

                        {showHistory && (
                            <div className="bg-white rounded-3xl shadow-soft border border-slate-100 p-6 mb-4">
                                <div className="flex items-center justify-between mb-4">
                                    <button onClick={safeBack} className="text-indigo-600 font-bold text-lg flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left"></i> Back
                                    </button>
                                    <h2 className="text-xl font-bold text-slate-800">History</h2>
                                    <div className="w-16"></div>
                                </div>
                                <div className="flex border-b border-slate-200 mb-4">
                                    <button onClick={() => setHistoryTab("success")} className={`flex-1 py-2 text-base font-bold border-b-2 ${historyTab === "success" ? "border-indigo-500 text-indigo-700" : "border-transparent text-slate-400"}`}>
                                        Found ({history.success.length})
                                    </button>
                                    <button onClick={() => setHistoryTab("failed")} className={`flex-1 py-2 text-base font-bold border-b-2 ${historyTab === "failed" ? "border-red-400 text-red-600" : "border-transparent text-slate-400"}`}>
                                        Missed ({history.failed.length})
                                    </button>
                                </div>
                                <div className="space-y-3 max-h-[50vh] overflow-y-auto">
                                    {historyTab === "success" && history.success.map((item, i) => (
                                        <div key={i} className="p-3 bg-slate-50 rounded-xl hover:bg-slate-100 flex justify-between items-center cursor-pointer"
                                            onClick={() => { window.location.hash = ''; searchUniversal(item.query); }}>
                                            <div>
                                                <p className="font-bold text-slate-800">{item.name}</p>
                                                <p className="text-xs text-slate-500">{item.query} • {new Date(item.date).toLocaleDateString()}</p>
                                            </div>
                                            <i className="fa-solid fa-chevron-right text-slate-400"></i>
                                        </div>
                                    ))}
                                    {historyTab === "success" && !history.success.length && <p className="text-slate-400 text-center py-6">No successful scans yet.</p>}

                                    {historyTab === "failed" && history.failed.map((item, i) => (
                                        <div key={i} className="p-3 bg-red-50 rounded-xl hover:bg-red-100 flex justify-between items-center cursor-pointer"
                                            onClick={() => { window.location.hash = ''; searchUniversal(item.query); }}>
                                            <div>
                                                <p className="font-bold text-red-800">{item.query}</p>
                                                <p className="text-xs text-red-600">{item.error}</p>
                                                <p className="text-xs text-red-500">{new Date(item.date).toLocaleDateString()}</p>
                                            </div>
                                            <i className="fa-solid fa-redo text-red-400"></i>
                                        </div>
                                    ))}
                                    {historyTab === "failed" && !history.failed.length && <p className="text-slate-400 text-center py-6">No failed scans.</p>}
                                </div>
                                {(history.success.length > 0 || history.failed.length > 0) && (
                                    <button onClick={() => { if(confirm('Clear all history?')) setHistory({success:[], failed:[]}); }} className="w-full mt-4 py-2 text-red-500 font-bold hover:bg-red-50 rounded-lg">
                                        Clear History
                                    </button>
                                )}
                            </div>
                        )}

                        {isHomeView && !loading && !error && (
                            <div className="space-y-5">
                                <div className="bg-gradient-to-br from-indigo-50 to-sky-50 rounded-3xl p-8 text-center shadow-soft border border-white">
                                    <div className="flex justify-center gap-4 mb-4 text-5xl">
                                        <i className="fa-solid fa-apple-whole text-green-400"></i>
                                        <i className="fa-solid fa-pump-soap text-pink-400"></i>
                                        <i className="fa-solid fa-spray-can-sparkles text-blue-400"></i>
                                        <i className="fa-solid fa-pills text-teal-400"></i>
                                    </div>
                                    <h2 className="text-3xl font-black text-indigo-900 mb-2">Read Tiny Print</h2>
                                    <p className="text-lg text-slate-600 mb-6">Scan barcodes on food, cosmetics, cleaning products, or medicine.</p>
                                    <button onClick={() => navTo('#scanner')} className="w-full py-5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-xl font-bold shadow-lg flex items-center justify-center gap-3">
                                        <i className="fa-solid fa-camera text-2xl"></i> Scan Barcode
                                    </button>
                                </div>
                                <div className="bg-white rounded-2xl p-6 shadow-soft border border-slate-100">
                                    <h3 className="text-xl font-bold text-slate-800 mb-4">Or type barcode</h3>
                                    <form onSubmit={handleManualSearch} className="flex flex-col gap-3">
                                        <input type="text" value={searchInput} onChange={e => setSearchInput(e.target.value)} placeholder="e.g. 0049000028904" className="w-full p-4 text-lg border border-slate-200 rounded-xl focus:ring-2 focus:ring-indigo-300 focus:border-indigo-400 outline-none" />
                                        <button type="submit" disabled={!searchInput} className="w-full py-4 bg-slate-800 hover:bg-slate-900 disabled:bg-slate-300 text-white rounded-xl text-lg font-bold">
                                            <i className="fa-solid fa-search mr-2"></i> Find Details
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {productData && !loading && !error && (
                            <div className="bg-white rounded-3xl shadow-soft overflow-hidden border border-slate-100">
                                <div className="p-3 bg-slate-50 border-b flex">
                                    <button onClick={resetApp} className="text-indigo-600 font-bold flex items-center gap-2">
                                        <i className="fa-solid fa-arrow-left"></i> Home
                                    </button>
                                </div>
                                {productType === "food" && renderOpenFactsData({ color: "green", icon: "fa-apple-whole", label: "Food" })}
                                {productType === "beauty" && renderOpenFactsData({ color: "pink", icon: "fa-pump-soap", label: "Personal Care" })}
                                {productType === "products" && renderOpenFactsData({ color: "blue", icon: "fa-spray-can-sparkles", label: "Product" })}
                                {productType === "medicine" && renderMedicine()}
                                {productType === "general" && renderGeneral()}
                                <div className="p-4 bg-slate-50 border-t">
                                    <button onClick={() => { setSearchInput(""); window.location.hash = 'scanner'; }} className="w-full py-4 bg-indigo-700 hover:bg-indigo-800 text-white rounded-2xl text-xl font-bold shadow flex items-center justify-center gap-3">
                                        <i className="fa-solid fa-barcode"></i> Scan Next Item
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Bottom navigation */}
                    {showBottomNav && (
                        <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 flex justify-around items-center py-2 px-4 shadow-[0_-4px_10px_rgba(0,0,0,0.03)] z-20">
                            <button onClick={() => navTo('')} className={`nav-item flex flex-col items-center gap-1 px-4 py-1 rounded-lg ${window.location.hash === '' || window.location.hash === '#home' ? 'text-indigo-600' : 'text-slate-400'}`}>
                                <i className="fa-solid fa-house text-2xl"></i>
                                <span className="text-xs font-semibold">Home</span>
                            </button>
                            <button onClick={() => navTo('#scanner')} className={`nav-item flex flex-col items-center gap-1 px-4 py-1 rounded-lg ${window.location.hash === '#scanner' ? 'text-indigo-600' : 'text-slate-400'}`}>
                                <i className="fa-solid fa-camera text-2xl"></i>
                                <span className="text-xs font-semibold">Scan</span>
                            </button>
                            <button onClick={() => navTo('#history')} className={`nav-item flex flex-col items-center gap-1 px-4 py-1 rounded-lg ${window.location.hash === '#history' ? 'text-indigo-600' : 'text-slate-400'}`}>
                                <i className="fa-solid fa-clock-rotate-left text-2xl"></i>
                                <span className="text-xs font-semibold">History</span>
                            </button>
                        </nav>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
